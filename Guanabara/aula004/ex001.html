<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            background-color: gray;
            font-family: Arial, Helvetica, sans-serif;
            color: wheat;
        }
    </style>
</head>
<body>
    <h1 name="Titulo">Primeiros passos com DOM</h1>
    <p>Iniciando estudos com <strong>DOM</strong></p>
    <p class="lorems">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus asperiores tenetur autem deserunt officiis tempora nam in reprehenderit repellendus beatae ipsum ullam ea eum, reiciendis aperiam eaque labore, placeat illo.</p>
    <div id="msg">Click em mim</div>
    <script>
        var corpo =  window.document.body
        var p1 = window.document.getElementsByTagName("p")[0]
        window.document.write(p1.innerHTML)
        p1.style.backgroundColor = "black"
        corpo.style.backgroundColor = 'purple'
        var mensagem = window.document.getElementById('msg')
        window.document.write('<br> <br>' + mensagem.innerText)
        window.document.getElementsByClassName('lorems')[0].innerText = 'VA pa porra'
        mensagem.innerText = 'hola'
        window.document.getElementsByName('Titulo')[0].innerText = "Tituto com JS"
        var titulos = window.document.querySelector('h1')
        titulos.style.backgroundColor = 'Yellow'
        titulos.style.color = 'black'
        /*

        getElementsByTagName("tag")[x] -- por tag
        window.document.getElementById -- por id
        window.document.getElementsByClassName('name')[x] -- por classes
        window.document.getElementsByName('name')[x] --  Por nome

        querySelector('h1')



        */ 
    </script>
</body>
</html>
